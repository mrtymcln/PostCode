name: 💡 Feature request
description: Suggest an idea, a feature, or a workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! I don't accept Pull Requests, but feel free to leave your suggestions as an Issue.
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or use case?
      description: What are you trying to do that PostCode makes hard, or can't do yet?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Anything else?
      description: Alternatives you've considered, examples from other tools, references, etc.
    validations:
      required: false
